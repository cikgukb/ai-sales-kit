<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ai-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/> <!-- Violet -->
      <stop offset="50%" stop-color="#3B82F6"/> <!-- Blue -->
      <stop offset="100%" stop-color="#10B981"/> <!-- Emerald for Sales/Growth -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Shield/App Icon Shape -->
  <rect width="100" height="100" rx="25" fill="url(#ai-gradient)" />
  
  <!-- AI Sparkles / Magic Stars -->
  <path d="M 25 20 Q 30 30 40 30 Q 30 30 30 40 Q 30 30 20 30 Q 30 30 25 20 Z" fill="#FDF08A" filter="url(#glow)" />
  <path d="M 75 15 Q 78 22 85 22 Q 78 22 78 29 Q 78 22 71 22 Q 78 22 75 15 Z" fill="#FDF08A" />
  
  <!-- Rising Sales Trend / Graph -->
  <path d="M 20 70 L 40 50 L 55 60 L 75 35" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Arrow Head -->
  <polyline points="60 35 75 35 75 50" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Glowing Dot on Arrow -->
  <circle cx="75" cy="35" r="5" fill="#FFFFFF" filter="url(#glow)"/>
</svg>